<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>牛牛1号</title>
    <script>
      (() => {
        const storageKey = 'niuone-dashboard-theme-v1';
        let theme = '';
        try { theme = localStorage.getItem(storageKey) || ''; } catch (error) {}
        if (theme !== 'light' && theme !== 'dark') {
          theme = window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%AE%3C/text%3E%3C/svg%3E" />
  </head>
  <body>
    <div id="app"><div class="app-bootstrap-loading">加载中…</div></div>
    <noscript>牛牛1号需要启用 JavaScript。</noscript>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
