<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>牛牛1号</title>
<script>
  (() => {
    const storageKey = 'niuone-dashboard-theme-v1';
    let theme = '';
    try { theme = localStorage.getItem(storageKey) || ''; } catch (error) {}
    if (theme !== 'light' && theme !== 'dark') {
      theme = window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    document.documentElement.dataset.theme = theme;
  })();
</script>

</head><body>
<header class="admin-header"><div class="admin-header-inner"><div><div class="eyebrow">牛牛1号 · 设置</div><h1 id="adminPageTitle">设置</h1></div><div class="admin-header-actions" id="adminHeaderActions">
