<head>

  <title>牛牛1号</title>
  <script>
    (() => {
      const storageKey = 'niuone-dashboard-theme-v1';
      let theme = '';
      try { theme = localStorage.getItem(storageKey) || ''; } catch (error) {}
      if (theme !== 'light' && theme !== 'dark') {
        theme = window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>
  <link rel="stylesheet" href="/static/dashboard.css?v=72">
